
# Sample Nginx configuration for optimal caching
# Include this in your server block

# Cache settings for hashed assets (JS, CSS with hash in filename and UUID-based uploads)
location ~* (\.[a-zA-Z0-9]{8,}\.(js|css)$|/lovable-uploads/[a-zA-Z0-9-]+\.(png|jpg|jpeg|webp|svg|gif)$) {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# Cache settings for non-hashed static assets
location ~* \.(js|css|png|jpg|jpeg|webp|svg|gif|ico|woff|woff2|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    access_log off;
}

# Don't cache HTML
location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}
